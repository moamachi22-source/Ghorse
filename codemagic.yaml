workflows:
  android-workflow:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps && npm install @babel/helper-validator-identifier@7.25.9 --legacy-peer-deps && npm install @babel/core@7.23.9 --legacy-peer-deps && npm install babel-plugin-module-resolver --legacy-peer-deps
      - name: Setup Expo
        script: npx expo install --check || true
      - name: Build Android Debug APK
        script: npx expo prebuild --platform android --clean && cd android && ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
