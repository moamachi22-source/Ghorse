workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Setup Expo
        script: |
          npx expo install --check
      - name: Build Android APK
        script: |
          npx expo prebuild --platform android --clean
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: 18.17.0
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Setup Expo
        script: |
          npx expo install --check
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build iOS
        script: |
          npx expo prebuild --platform ios --clean
          xcodebuild -workspace ios/ghors.xcworkspace \
            -scheme ghors \
            -configuration Release \
            -archivePath ios/ghors.xcarchive \
            archive
    artifacts:
      - ios/ghors.xcarchive
