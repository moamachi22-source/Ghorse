workflows:
  android-workflow:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      node: 18.17.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps && npm install @babel/helper-validator-identifier@7.25.9 --legacy-peer-deps && npm install @babel/core@7.23.9 --legacy-peer-deps && npm install babel-plugin-module-resolver --legacy-peer-deps
      - name: Setup Expo
        script: npx expo install --check || true
      - name: Prebuild
        script: npx expo prebuild --platform android --clean
      - name: Bundle JavaScript
        script: cd android && mkdir -p app/src/main/assets && cd .. && npx react-native bundle --platform android --dev false --entry-file node_modules/expo-router/entry.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
      - name: Build Android Debug APK
        script: cd android && ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
